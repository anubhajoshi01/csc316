<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ending</title>

  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body class="transition-body ending-body">

  <button 
    onclick="window.location.href='../vis2/index.html'" 
    class="navBtn nav-left"
  >
    &lt;
  </button>

  <!-- navbar thing -->
  <svg width=650 height="50" class="nav-bar-svg">
    <line x1="25" x2="625" y1="25" y2="25" class="nav-bar"></line>
    <circle class="nav-link" r="5" cx="25" cy="25" onClick="window.location.href='../opening/index.html'"/>
    <circle class="nav-link" r="5" cx="125" cy="25" onClick="window.location.href='../scale/index.html'"/>
    <circle class="nav-link" r="5" cx="225" cy="25" onClick="window.location.href='../vis1/index.html'"/>
    <circle class="nav-link" r="5" cx="325" cy="25" onClick="window.location.href='../vis3/index.html'"/>
    <circle class="nav-link" r="5" cx="425" cy="25" onClick="window.location.href='../vis4/index.html'"/>
    <circle class="nav-link" r="5" cx="525" cy="25" onClick="window.location.href='../vis2/index.html'"/>
    <circle class="nav-link-active" r="5" cx="625" cy="25"/>
  </svg>


<section class="vis2 transition-page ending-page" id="endingPage" aria-label="Ending page">
  <div class="wrap transition-wrap ending-wrap">

    <div class="transition-stars" aria-hidden="true">
      <span class="star star-1"></span>
      <span class="star star-2"></span>
      <span class="star star-3"></span>
      <span class="star star-4"></span>
      <span class="star star-5"></span>
      <span class="star star-6"></span>
    </div>

    <img
            src="img/telescope.png"
            alt=""
            class="ending-telescope"
            aria-hidden="true"
    />

    <div class="ending-stage" aria-live="polite">
      <p class="ending-line" id="line1">
        We once thought the solar system was fully mapped.
      </p>

      <p class="ending-line" id="line2">
        But in August 2025, astronomers using NASA’s James Webb Space Telescope
        identified a new moon of Uranus
        <span class="ending-highlight">S/2025 U1</span>.
      </p>

      <p class="ending-line" id="line3">
        Even now, there is more to discover!
      </p>

      <button
        onclick="window.location.href='../opening/index.html'"
        class="ending-back-button"
        id="backButton"
      >
        Back to Start
      </button>
    </div>

    <p class="transition-hint ending-hint" id="endingHint">
      Click anywhere
    </p>

    <noscript>
      <p class="transition-hint transition-hint-static ending-noscript">
        <a href="../opening/index.html">Continue</a>
      </p>
    </noscript>

  </div>
</section>

<script src="js/ending.js"></script>
</body>
</html>
