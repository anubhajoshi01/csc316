<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>CSC316 Team Banana</title>

  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>
  <button 
    onclick="window.location.href='../opening/'" 
    class="navBtn nav-left"
  >
    &lt;
  </button>

  <!-- Right navigation -->
  <button 
    onclick="window.location.href='../vis1/'" 
    class="navBtn nav-right"
  >
    &gt;
  </button>

  <!-- navbar thing -->
  <svg width=650 height="50" class="nav-bar-svg">
    <line x1="25" x2="625" y1="25" y2="25" class="nav-bar"></line>
    <circle class="nav-link" r="5" cx="25" cy="25" onClick="window.location.href='../opening/'"/>
    <circle class="nav-link-active" r="5" cx="125" cy="25"/>
    <circle class="nav-link" r="5" cx="225" cy="25" onClick="window.location.href='../vis1/'"/>
    <circle class="nav-link" r="5" cx="325" cy="25" onClick="window.location.href='../vis3/'"/>
    <circle class="nav-link" r="5" cx="425" cy="25" onClick="window.location.href='../vis4/'"/>
    <circle class="nav-link" r="5" cx="525" cy="25" onClick="window.location.href='../vis2/'"/>
    <circle class="nav-link" r="5" cx="625" cy="25" onClick="window.location.href='../ending/'"/>
  </svg>

  <section class="scale-page">
    <div class="wrap">
      <h1>Earth is big, but space is bigger!</h1>
      <h4>Use the scale to see how heavy other planets are compared to the Earth!</h4>

      <div class="panel">
        <div class="controls">
          <div class="field">
            <label>Select a planet</label>
            <div id="ddA" class="dropdown"></div>
          </div>

          <div class="scale-button-container">
            <p id="add-planet-text">Add Jupiters</p>
            <button class="add-planet" id="planet-1">+1</button>
            <button class="add-planet" id="planet-10">+10</button>
            <button class="add-planet" id="planet-100">+100</button>
          </div>

          <div class="scale-button-container">
            <p id="add-earth-text">Add Earths</p>
            <button class="add-planet" id="earth-1">+1</button>
            <button class="add-planet" id="earth-10">+10</button>
            <button class="add-planet" id="earth-100">+100</button>
          </div>

          <div class="scale-button-container">
            <button class="clear-button" id="clear-all-scale">Clear All</button>
          </div>
        </div>

        <svg id="vis" width="100%" height="420"></svg>
      </div>
    </div>

  </section>

  <script src="js/mass.js"></script>

</body>

</html>
