<!doctype html>
<html>

<head>
  <meta charset="utf-8">
  <title>Scale</title>

  <link rel="stylesheet" href="../css/styles.css" />
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>

<body>

  <section class="scale-page">
    <div class="wrap">
      <h1>Earth is big, but space is bigger!</h1>
      <h4>Use the scale to see how heavy other planets are compared to the Earth!</h4>

      <div class="panel">
        <div class="controls">
          <div class="field">
            <label>Select a planet</label>
            <div id="ddA" class="dropdown"></div>
          </div>
          <!-- <input id="num-bodies">
          <label>number of planets</label>
        </input> -->
          <div class="scale-button-container">
            <p id="add-planet-text">Add Jupiters</p>
            <button class="add-planet" id="planet-1">+1</button>
            <button class="add-planet" id="planet-10">+10</button>
            <button class="add-planet" id="planet-100">+100</button>
          </div>

          <div class="scale-button-container">
            <p id="add-earth-text">Add Earths</p>
            <button class="add-planet" id="earth-1">+1</button>
            <button class="add-planet" id="earth-10">+10</button>
            <button class="add-planet" id="earth-100">+100</button>
          </div>

          <div class="scale-button-container">
            <button class="clear-button" id="clear-all-scale">Clear All</button>
          </div>
          <!-- <input id="num-earths">
          <label>number of earths</label>
        </input>
        <button id="scale-go-button">go</button> -->

          <!-- <div class="field">
          <label>Compared with</label>
          <div class="staticBox">Earth</div>
        </div> -->
        </div>

        <svg id="vis" width="100%" height="420"></svg>
      </div>
    </div>

    <div style="text-align:center; margin:20px 0;">
      <button onclick="window.location.href='../vis1/index.html'" class="navBtn">
        Continue to Vis 1
      </button>
    </div>
  </section>

  <script src="js/mass.js"></script>

</body>

</html>
