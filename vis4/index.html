<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>CSC316 Team Banana</title>

  <!-- D3 library -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <link rel="stylesheet" type="text/css" href="../css/styles.css">

</head>

<body>

  <button 
    onclick="window.location.href='../transition2/'"
    class="navBtn nav-left"
  >
    &lt;
  </button>

  <!-- Right navigation -->
  <button 
    onclick="window.location.href='../transition3/'"
    class="navBtn nav-right"
  >
    &gt;
  </button>

<!-- navbar thing -->
  <svg width=650 height="50" class="nav-bar-svg">
    <line x1="25" x2="625" y1="25" y2="25" class="nav-bar"></line>
    <circle class="nav-link" r="5" cx="25" cy="25" onClick="window.location.href='../opening/'"/>
    <circle class="nav-link" r="5" cx="125" cy="25" onClick="window.location.href='../scale/'"/>
    <circle class="nav-link" r="5" cx="225" cy="25" onClick="window.location.href='../vis1/'"/>
    <circle class="nav-link" r="5" cx="325" cy="25" onClick="window.location.href='../vis3/'"/>
    <circle class="nav-link-active" r="5" cx="425" cy="25"/>
    <circle class="nav-link" r="5" cx="525" cy="25" onClick="window.location.href='../vis2/'"/>
    <circle class="nav-link" r="5" cx="625" cy="25" onClick="window.location.href='../ending/'"/>
  </svg>

  <h1 class="title">Which bodies have the least circular orbits?</h1>
  <p id="description">The <strong>eccentricity</strong> of an orbit is a number that measures how "un-circular" the orbit is.</p>
  <p id="description">Earth's orbit has a low eccentricity, which means it is nearly circular. This is included as a point of comparison.</p>

  <div style="position: relative; width: 1100px; margin: 0 auto;">
    <div id="tooltip"></div>
    <div id="vis4"></div>
    <div id="legend" style="position: absolute; top: 0px; right: 0px;">
    </div>
    <div class="controls-side" style="position: absolute; top: 400px; right: 0px;">
      <button id="orbit-toggle" >
        Start Orbits
      </button>
      <button id="reset-btn" disabled>
        Reset Orbits
      </button>

      <div class="slider-container">
        <label for="speed-slider">Warp Speed</label>
        <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1">
        <span id="speed-value">1x</span>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>

</body>
</html>
