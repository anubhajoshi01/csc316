<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CSC316 Team Banana</title>

  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="transition-body opening-body">


  <!-- Right navigation -->
  <button onclick="window.location.href='../scale/'" class="navBtn nav-right">
    &gt;
  </button>

  <!-- navbar thing -->
  <svg width=650 height="50" class="nav-bar-svg">
    <line x1="25" x2="625" y1="25" y2="25" class="nav-bar"></line>
    <circle class="nav-link-active" r="5" cx="25" cy="25"/>
    <circle class="nav-link" r="5" cx="125" cy="25" onClick="window.location.href='../scale/'"/>
    <circle class="nav-link" r="5" cx="225" cy="25" onClick="window.location.href='../vis1/'"/>
    <circle class="nav-link" r="5" cx="325" cy="25" onClick="window.location.href='../vis3/'"/>
    <circle class="nav-link" r="5" cx="425" cy="25" onClick="window.location.href='../vis4/'"/>
    <circle class="nav-link" r="5" cx="525" cy="25" onClick="window.location.href='../vis2/'"/>
    <circle class="nav-link" r="5" cx="625" cy="25" onClick="window.location.href='../ending/'"/>
  </svg>

  <section class="vis2 transition-page opening-page" id="openingPage" aria-label="Opening page">
    <div class="wrap transition-wrap opening-wrap">

      <div class="transition-stars" aria-hidden="true">
        <span class="star star-1"></span>
        <span class="star star-2"></span>
        <span class="star star-3"></span>
        <span class="star star-4"></span>
        <span class="star star-5"></span>
        <span class="star star-6"></span>
      </div>

      <div class="opening-stage" aria-live="polite">
        <p class="opening-line" id="line1">
          Have you ever looked up and wondered why some worlds seem so much larger than others?
        </p>

        <p class="opening-line" id="line2">
          In our solar system, a few planets feel almost unbelievably
          <span class="opening-highlight">massive</span>.
        </p>

        <p class="opening-line" id="line3">
          Let’s start with one simple question:
          <span class="opening-highlight opening-highlight-block">
            how massive is each planet compared to Earth？
          </span>
        </p>
      </div>

      <p class="transition-hint opening-hint" id="openingHint">
        Click anywhere to continue
      </p>

      <noscript>
        <p class="transition-hint transition-hint-static opening-noscript">
          <a href="../scale/">Continue</a>
        </p>
      </noscript>

    </div>
  </section>

  <script src="js/opening.js"></script>
</body>

</html>
